function filterGallery() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = catalog.filter(p => p.title.toLowerCase().includes(q));
  renderGrid(filtered);
}

function renderGrid(items) {
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = `${items.length} pens`;
  if (items.length === 0) {
    grid.innerHTML = '<div class="no-results">No pens found.</div>';
    return;
  }
  grid.innerHTML = items.map(p => `
    <div class="card">
      <img src="images/${p.file}" alt="${p.title}" loading="lazy">
      <div class="card-body">
        <div class="card-title">${p.title}</div>
      </div>
    </div>`).join('');
}

renderGrid(catalog);
</script>
